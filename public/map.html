<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Deed Exchange Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .mapboxgl-ctrl-bottom-left,
    .mapboxgl-ctrl-bottom-right {
      display: none;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    mapboxgl.accessToken = "pk.eyJ1Ijoib2htc3JhZGlvIiwiYSI6ImNtbmxuZGFpaDFhNGkycnE1ajlqZHVmeTMifQ.0D3kQ_qlHIGiskjSo5D-aQ";

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/streets-v12",
      center: [-81.530993, 41.058867],
      zoom: 18.5,
      pitch: 0,
      bearing: 0,
      attributionControl: false
    });

    window.setPlayerLocation = function(lat, lng) {
      map.flyTo({
        center: [lng, lat],
        zoom: 18.5,
        pitch: 0,
        bearing: 0,
        speed: 1.2
      });
    };
  </script>
</body>
</html>
