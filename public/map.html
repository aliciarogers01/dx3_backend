<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Deed Exchange Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .leaflet-control-container {
      display: none;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    const MAPBOX_TOKEN = "pk.eyJ1Ijoib2htc3JhZGlvIiwiYSI6ImNtbmxuZGFpaDFhNGkycnE1ajlqZHVmeTMifQ.0D3kQ_qlHIGiskjSo5D-aQ";

    const map = L.map("map", {
      zoomControl: false,
      attributionControl: false
    }).setView([41.058867, -81.530993], 19);

    L.tileLayer(
      "https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/512/{z}/{x}/{y}@2x?access_token=" + MAPBOX_TOKEN,
      {
        tileSize: 512,
        zoomOffset: -1,
        maxZoom: 22
      }
    ).addTo(map);

    const playerMarker = L.circleMarker([41.058867, -81.530993], {
      radius: 8,
      color: "#0066ff",
      fillColor: "#0066ff",
      fillOpacity: 1
    }).addTo(map);

    window.setPlayerLocation = function(lat, lng) {
      map.setView([lat, lng], 19);
      playerMarker.setLatLng([lat, lng]);
    };
  </script>
</body>
</html>
