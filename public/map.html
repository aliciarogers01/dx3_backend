<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Deed Exchange Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    html, body, #map {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .leaflet-control-container {
      display: none;
    }

    .property-dot {
      width: 22px;
      height: 22px;
      background: #ffcc00;
      border: 3px solid #111;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      cursor: pointer;
    }

    .property-card {
      font-size: 14px;
      line-height: 1.3;
    }

    .property-card img {
      width: 180px;
      height: 110px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .property-card button {
      width: 100%;
      padding: 8px;
      background: #111;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script>
    const MAPBOX_TOKEN = "pk.eyJ1Ijoib2htc3JhZGlvIiwiYSI6ImNtbmxuZGFpaDFhNGkycnE1ajlqZHVmeTMifQ.0D3kQ_qlHIGiskjSo5D-aQ";

    const startLat = 41.058867;
    const startLng = -81.530993;

    const map = L.map("map", {
      zoomControl: false,
      attributionControl: false
    }).setView([startLat, startLng], 19);

    L.tileLayer(
      "https://api.mapbox.com/styles/v1/mapbox/streets-v12/tiles/512/{z}/{x}/{y}?access_token=" + MAPBOX_TOKEN,
      {
        tileSize: 512,
        zoomOffset: -1,
        maxZoom: 22
      }
    ).addTo(map);

    const playerMarker = L.circleMarker([startLat, startLng], {
      radius: 8,
      color: "#0066ff",
      fillColor: "#0066ff",
      fillOpacity: 1
    }).addTo(map);

    const propertyIcon = L.divIcon({
      className: "",
      html: '<div class="property-dot"></div>',
      iconSize: [28, 28],
      iconAnchor: [14, 14]
    });

    const propertyMarkers = [];

    async function loadNearbyBuildings(lat, lng) {
      const radius = 500;

      const query = `
        [out:json][timeout:25];
        (
          way["building"](around:${radius},${lat},${lng});
          relation["building"](around:${radius},${lat},${lng});
        );
        out center tags 100;
      `;

      const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

      const response = await fetch(url);
      const data = await response.json();

      propertyMarkers.forEach(marker => map.removeLayer(marker));
      propertyMarkers.length = 0;

      data.elements.forEach((building, index) => {
        if (!building.center) return;

        const tags = building.tags || {};

        const address =
          tags["addr:housenumber"] && tags["addr:street"]
            ? tags["addr:housenumber"] + " " + tags["addr:street"]
            : "Unknown Property #" + (index + 1);

        addPropertyMarker({
          address: address,
          lat: building.center.lat,
          lng: building.center.lon,
          image: "https://placehold.co/300x200?text=Property"
        });
      });
    }

    function addPropertyMarker(property) {
      const marker = L.marker([property.lat, property.lng], {
        icon: propertyIcon
      }).addTo(map);

      marker.bindPopup(`
        <div class="property-card">
          <img src="${property.image}" />
          <strong>${property.address}</strong>
          <button onclick="inquireProperty('${property.address.replace(/'/g, "\\'")}')">Inquire</button>
        </div>
      `);

      propertyMarkers.push(marker);
    }

    loadNearbyBuildings(startLat, startLng);

    window.inquireProperty = function(address) {
      alert("Inquire pressed for:\n" + address);
    };

    window.setPlayerLocation = function(lat, lng) {
      map.setView([lat, lng], 19);
      playerMarker.setLatLng([lat, lng]);
      loadNearbyBuildings(lat, lng);
    };
  </script>
</body>
</html>
